<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Large Language Object — hardware bridge</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <header>
    <h1>Large Language Object</h1>
    <span class="sub">single player · Pro Micro / USB serial</span>
    <div class="serial-bar">
      <span id="serial-status">Serial disconnected</span>
      <button type="button" id="btn-serial">Connect serial</button>
    </div>
  </header>

  <main>
    <section class="panel">
      <div class="panel-head">Filter levels</div>
      <div class="knob-panel">
        <div class="knob-header">Web sliders (0–100). With serial connected, physical pots update these too.</div>
        <div id="knobs"></div>
      </div>
      <div class="panel-head" style="border-top:1px solid var(--border)">Memory</div>
      <div class="knob-panel" style="padding-top:12px">
        <span id="mem-badge">no memory</span>
        <button type="button" id="btn-reset" style="margin-top:10px;background:none;border:1px solid var(--border2);border-radius:6px;color:var(--muted);font-family:var(--font-mono);font-size:10px;padding:4px 10px;cursor:pointer;text-transform:uppercase;letter-spacing:0.06em">Reset memory</button>
      </div>
    </section>

    <section class="text-panel">
      <div class="input-head">
        <label for="received">Received text</label>
        <span id="mic-status" class="mic-status">Mic idle</span>
      </div>
      <textarea id="received" placeholder="Paste, type, or use Start listening below…"></textarea>

      <div class="actions actions-mic">
        <button type="button" id="btn-mic-start" class="btn-mic btn-mic-start">Start listening</button>
        <button type="button" id="btn-mic-stop" class="btn-mic btn-mic-stop" disabled>Stop listening</button>
      </div>

      <div class="actions">
        <button type="button" id="btn-translate">Translate</button>
        <span class="hint-keys">⌃⌘ Enter · Chrome / Edge for mic</span>
      </div>

      <div class="input-head input-head-translation">
        <label for="translation">Translation (filtered)</label>
        <div class="tts-controls">
          <label class="tts-check"><input type="checkbox" id="tts-auto"> Speak new lines</label>
          <label class="tts-inline">Engine
            <select id="tts-engine" class="tts-select" aria-label="TTS engine">
              <option value="openai" selected>OpenAI (neural)</option>
              <option value="browser">Browser (system)</option>
            </select>
          </label>
          <label class="tts-inline">Model
            <select id="tts-model" class="tts-select" aria-label="OpenAI TTS model">
              <option value="gpt-4o-mini-tts" selected>gpt-4o-mini-tts</option>
              <option value="tts-1-hd">tts-1-hd</option>
              <option value="tts-1">tts-1</option>
            </select>
          </label>
          <label class="tts-inline">Voice
            <select id="tts-voice" class="tts-select" aria-label="OpenAI voice">
              <option value="nova">nova</option>
              <option value="alloy">alloy</option>
              <option value="ash">ash</option>
              <option value="coral">coral</option>
              <option value="echo">echo</option>
              <option value="fable">fable</option>
              <option value="onyx">onyx</option>
              <option value="sage">sage</option>
              <option value="shimmer">shimmer</option>
              <option value="ballad">ballad</option>
              <option value="verse">verse</option>
              <option value="marin">marin</option>
              <option value="cedar">cedar</option>
            </select>
          </label>
          <button type="button" class="btn-tts" id="btn-tts-last">Speak last line</button>
          <button type="button" class="btn-tts" id="btn-tts-stop">Stop speech</button>
        </div>
      </div>
      <textarea id="translation" readonly placeholder="Each spoken segment and manual translate append here on new lines."></textarea>
    </section>
  </main>

  <script type="module" src="js/app.js"></script>
</body>
</html>
